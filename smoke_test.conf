# dcSim smoke-test config (small Fat-Tree k=4 -> 16 hosts)
# Format: key: value (each key MUST end with a colon)

# === Topology ===
# FatTree auto-computes: num_hosts = k^3/4, num_agg = k^2/2, num_core = k^2/4
topology: FatTree
k: 4
bandwidth: 800000000000
queue_size: 500000
propagation_delay: 0.0000002

# === Protocol selection ===
# 117 = SNS (dcSim), 116 = PIM (dcPIM), 2 = pFabric, 43 = DCTCP
flow_type: 117
# 6 = SNS_QUEUE (must match flow_type for dcSim)
queue_type: 6

# === Workload: Permutation (each host -> single peer) ===
permutation_tm: 1
num_flow: 16
mean_flow_size: 100000
load: 0.5
flow_trace: smoke_test_flowsize.cdf

# === Required common params ===
hdr_size: 40
init_cwnd: 12
max_cwnd: 87
retx_timeout: 0.0001
cut_through: 0
load_balancing: 0
preemptive_queue: 0
big_switch: 0
host_type: 17
imbalance: 0
traffic_imbalance: 0
reauth_limit: 3
magic_trans_slack: 0.000001
magic_delay_scheduling: 0
use_flow_trace: 0
smooth_cdf: 0
burst_at_beginning: 0
num_host_types: 1

# === SNS-specific (dcSim) ===
big_mtu: 2
synced_mode: 1
param_b: 12
l_mult: 1
worst_rrt_factor: 1.0
clock_drift: 0.0
debug_sns: 0
debug_sns2: 0

# === Structured output files ===
fct_file: output/fct.txt
drop_pkt_file: output/drops.txt
util_file: output/utilization.txt
drop_reorder_file: output/drop_reorder.txt
util_all_file: output/util_all.txt
num_data_packets_per_sim_ack: 16
core_div_2: 0
