# dcSim (SNS) — base config for Fig. 5(a) reproduction
# Topology: Fat-Tree k=4 (16 hosts)

# === Topology ===
topology: FatTree
k: 4
bandwidth: 800000000000
queue_size: 500000
propagation_delay: 0.0000002

# === Protocol: dcSim (SNS) ===
flow_type: 117
queue_type: 6
host_type: 17

# === Workload: Permutation ===
permutation_tm: 1
num_flow: 16
mean_flow_size: 100000
load: 0.5
flow_trace: __FLOW_TRACE__

# === Required (non-zero values that the simulator depends on) ===
init_cwnd: 12              # initial congestion window (pkts) - 0 would prevent TCP-style flows from sending
max_cwnd: 87               # max cwnd cap (pkts) - paper k=8 BDP
retx_timeout: 0.0001       # retransmit timeout (s) - 100us; 0 would mean instant retransmit
reauth_limit: 3            # capability/RUF re-auth limit (only relevant for those flow types)
magic_trans_slack: 0.000001  # magic-flow scheduling slack (only used by MAGIC_FLOW)
num_host_types: 1          # 0 would underflow loop counters in flow_generator.cpp

# === Optional (have safe defaults: either set in params.cpp or zero is correct) ===
# hdr_size: 40            # default in params.cpp:20
# cut_through: 0          # 0 = store-and-forward (default behavior)
# load_balancing: 0       # 0 = per-packet ECMP (paper §2.4 default)
# preemptive_queue: 0     # 0 = no preemption (override to 1 in pFabric config)
# big_switch: 0           # 0 = full Fat-Tree (no collapse)
# imbalance: 0            # 0 = no traffic skew
# traffic_imbalance: 0    # 0 = no skew
# magic_delay_scheduling: 0  # MAGIC_FLOW only
# use_flow_trace: 0       # 0 = use generator (PermutationTM); 1 = read FlowReader trace
# smooth_cdf: 0           # 0 = step CDF; 1 = interpolated
# burst_at_beginning: 0   # 0 = staggered flow starts

# === SNS-specific ===
big_mtu: 2
synced_mode: 1
param_b: 12
l_mult: 1
worst_rrt_factor: 1.0
clock_drift: 0.0
debug_sns: 0
debug_sns2: 0
num_data_packets_per_sim_ack: 1   # k from paper §2.3 footnote (1 Sim per 1 Data, paper baseline)
core_div_2: 0

# === Output files (relative to /workspace) ===
fct_file: __OUT__/fct.txt
drop_pkt_file: __OUT__/drops.txt
util_file: __OUT__/utilization.txt
drop_reorder_file: __OUT__/drop_reorder.txt
util_all_file: __OUT__/util_all.txt
