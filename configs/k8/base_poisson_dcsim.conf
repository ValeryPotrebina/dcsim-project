# dcSim (SNS) - Poisson web-search workload (non-AI experiment)
# Fat-Tree k=8 (128 hosts); open-loop Poisson arrivals; web-search flow-size CDF

# === Topology ===
topology: FatTree
k: 8
bandwidth: 800000000000
queue_size: 500000
propagation_delay: 0.0000002

# === Protocol: dcSim (SNS) ===
flow_type: 117
queue_type: 6
host_type: 17

# === Workload: open-loop Poisson, web-search CDF (sizes in packets) ===
use_flow_trace: 0
flow_trace: inputs/websearch.cdf
load: 0.4
num_flow: 2000

# === Transport / window ===
init_cwnd: 12
max_cwnd: 87
retx_timeout: 0.0001
num_host_types: 1

# === SNS-specific ===
big_mtu: 2
synced_mode: 1 //0 for aysnc mode
param_b: 12
l_mult: 1
worst_rrt_factor: 1.0
clock_drift: 0.0
debug_sns: 0
debug_sns2: 0
num_data_packets_per_sim_ack: 1
core_div_2: 0

fct_file: output/adaptive_sns/load0.4/fct.txt
record_rtt_file: output/adaptive_sns/load0.4/record_rtt.txt
