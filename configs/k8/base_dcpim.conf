# dcPIM - All-to-All collective
# Fat-Tree k=8 (128 hosts)
# === Topology ===
topology: FatTree
k: 8
bandwidth: 800000000000
queue_size: 500000
propagation_delay: 0.0000002

# === Protocol: dcPIM ===
flow_type: 116
queue_type: 1
host_type: 16

# === Workload ===
use_flow_trace: 1
flow_trace: all_to_all_0.5bdp.tr

# === Required ===
init_cwnd: 12
max_cwnd: 87
retx_timeout:  0.0001
num_host_types: 1

# === Packet size ===
big_mtu: 2
num_flow: 16256


# === PIM-specific ===
pim_iter_limit: 4
pim_alpha: 1.0
pim_beta: 1.3
pim_k: 4
pim_select_min_iters: 1

token_initial: 0
token_timeout: 10
token_resend_timeout: 8
token_window: 6
token_window_timeout: 1.1

# === Output files ===
fct_file: output/dcpim/bdp0.5/fct.txt
