# dcPIM (PIM) - Poisson web-search workload (non-AI experiment)
# Fat-Tree k=8 (128 hosts); open-loop Poisson arrivals; web-search flow-size CDF
# Protocol block copied from configs/k8/base_dcpim.conf; workload = open-loop Poisson

# === Topology ===
topology: FatTree
k: 8
bandwidth: 800000000000
queue_size: 500000
propagation_delay: 0.0000002

# === Protocol: dcPIM (PIM) ===
flow_type: 116
queue_type: 1
host_type: 16

# === Workload: open-loop Poisson, web-search CDF (sizes in packets) ===
use_flow_trace: 0
flow_trace: inputs/websearch.cdf
load: 0.6
num_flow: 2000

# === Required ===
init_cwnd: 12
max_cwnd: 87
retx_timeout: 0.0001
reauth_limit: 3
magic_trans_slack: 0.000001
num_host_types: 1

# === Packet size ===
big_mtu: 2

# === PIM-specific ===
pim_iter_limit: 5
pim_alpha: 1.0
pim_beta: 1.5
pim_k: 4
pim_select_min_iters: 1
token_initial: 1          # short-flow threshold; scaled x BDP(=87) for PIM_HOST -> flows <= 1 BDP sent immediately, no matching (paper: 1 BDP)

fct_file: output/poisson_dcpim/load0.6/fct.txt
