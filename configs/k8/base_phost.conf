# Topology: Fat-Tree k=8 (128 hosts) -- paper-scale

# === Topology ===
topology: FatTree
k: 8
bandwidth: 800000000000
queue_size: 500000
propagation_delay: 0.0000002

flow_type: 112
queue_type: 2
host_type: 12

use_flow_trace: 1
flow_trace: all_to_all_0.5bdp.tr
num_flow: 16256


init_cwnd: 12              # initial congestion window (pkts) - 0 would prevent TCP-style flows from sending
max_cwnd: 87               # max cwnd cap (pkts) - paper k=8 BDP
retx_timeout: 0.0001       # retransmit timeout (s) - 100us; 0 would mean instant retransmit
num_host_types: 1          # 0 would underflow loop counters in flow_generator.cpp

big_mtu: 2

capability_timeout: 5
capability_resend_timeout: 1
capability_initial: 0
capability_window: 5
capability_window_timeout: 1

fct_file: output/phost/bdp0.5/fct.txt
